name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Vet all services
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - restaurant-service
          - order-service
          - delivery-service
          - notification-service
          - admin-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Build
        working-directory: ${{ matrix.service }}
        run: go build ./...

      - name: Vet
        working-directory: ${{ matrix.service }}
        run: go vet ./...
