version: "3.9"

# Full stack compose — includes infra AND all service containers.
# Run with: docker compose up --build
# For local Go dev (run services outside Docker): use docker-compose.infra.yml instead.

services:

  # ── Infrastructure (reuse from infra file) ────────────────────────────────────
  postgres-auth:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       auth_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # ── Auth Service ──────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      APP_ENV:     development
      APP_PORT:    "8001"
      DB_HOST:     postgres-auth
      DB_PORT:     "5432"
      DB_USER:     postgres
      DB_PASSWORD: postgres
      DB_NAME:     auth_db
      REDIS_HOST:  redis
      REDIS_PORT:  "6379"
      JWT_SECRET:  "change-me-in-production"
      ACCESS_TOKEN_TTL_MINUTES:  "15"
      REFRESH_TOKEN_TTL_DAYS:    "7"
      RATE_LIMIT_AUTH_RPM:       "30"
      RATE_LIMIT_PUBLIC_RPM:     "100"
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # Add more services here as you build them:
  # user-service:
  #   build: { context: ./user-service }
  #   ports: ["8002:8002"]
  #   ...

volumes:
  auth-data:
  redis-data: