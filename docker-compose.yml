services:
  # ── Infrastructure ────────────────────────────────────────────────────────────
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB:       auth_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:15-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB:       user_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - user-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    # ✅ FIX: proper healthcheck — waits until RabbitMQ is actually accepting connections
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres-restaurant:
    image: postgres:15-alpine
    container_name: postgres-restaurant
    environment:
      POSTGRES_DB:       restaurant_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - restaurant-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:15-alpine
    container_name: postgres-order
    environment:
      POSTGRES_DB:       order_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - order-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Auth Service ──────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      APP_ENV:                   development
      APP_PORT:                  "8001"
      DB_HOST:                   postgres-auth
      DB_PORT:                   "5432"
      DB_USER:                   postgres
      DB_PASSWORD:               postgres
      DB_NAME:                   auth_db
      REDIS_HOST:                redis
      REDIS_PORT:                "6379"
      JWT_SECRET:                "change-me-in-production"
      ACCESS_TOKEN_TTL_MINUTES:  "15"
      REFRESH_TOKEN_TTL_DAYS:    "7"
      RATE_LIMIT_AUTH_RPM:       "30"
      RATE_LIMIT_PUBLIC_RPM:     "100"
      USER_SERVICE_URL:          "http://user-service:8002"
      RABBITMQ_URL:              "amqp://guest:guest@rabbitmq:5672/"
      ADMIN_EMAIL:               "admin@admin.com"
      ADMIN_PASSWORD:             "admin"
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy   # ✅ FIX: wait for healthy, not just started
    restart: unless-stopped

  # ── User Service ──────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8002:8002"
    environment:
      PORT:         "8002"
      DATABASE_URL: postgres://postgres:postgres@postgres-user:5432/user_db?sslmode=disable
      REDIS_ADDR:   redis:6379
      JWT_SECRET:   "change-me-in-production"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy   # ✅ FIX: wait for healthy, not just started
    restart: unless-stopped

  # ── Restaurant Service ────────────────────────────────────────────────────────
  restaurant-service:
    build:
      context: ./restaurant-service
      dockerfile: Dockerfile
    container_name: restaurant-service
    ports:
      - "8003:8003"
    environment:
      PORT:              "8003"
      DATABASE_URL:      postgres://postgres:postgres@postgres-restaurant:5432/restaurant_db?sslmode=disable
      REDIS_ADDR:        redis:6379
      JWT_SECRET:        "change-me-in-production"
      ORDER_SERVICE_URL: "http://order-service:8004"
      RABBITMQ_URL:      amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres-restaurant:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Order Service ─────────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8004:8004"
    environment:
      PORT:                     "8004"
      DATABASE_URL:             postgres://postgres:postgres@postgres-order:5432/order_db?sslmode=disable
      REDIS_URL:                redis:6379
      RABBITMQ_URL:             "amqp://guest:guest@rabbitmq:5672/"
      JWT_SECRET:               "change-me-in-production"
      RESTAURANT_SERVICE_URL:   "http://restaurant-service:8003"
      IDEMPOTENCY_EXPIRY:       "24h"
    depends_on:
      postgres-order:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  postgres-delivery:
    image: postgres:15-alpine
    container_name: postgres-delivery
    environment:
      POSTGRES_DB:       delivery_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - delivery-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Delivery Service ──────────────────────────────────────────────────────────
  delivery-service:
    build:
      context: ./delivery-service
      dockerfile: Dockerfile
    container_name: delivery-service
    ports:
      - "8005:8005"
    environment:
      PORT:               "8005"
      DATABASE_URL:       postgres://postgres:postgres@postgres-delivery:5432/delivery_db?sslmode=disable
      REDIS_URL:          redis:6379
      RABBITMQ_URL:       "amqp://guest:guest@rabbitmq:5672/"
      JWT_SECRET:         "change-me-in-production"
      ORDER_SERVICE_URL:  "http://order-service:8004"
    depends_on:
      postgres-delivery:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── pgAdmin ───────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      # ✅ FIX: auto-load servers from the file below — no manual setup ever again
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    volumes:
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres-auth
      - postgres-user
      - postgres-restaurant
      - postgres-order
      - postgres-delivery
    restart: unless-stopped

volumes:
  auth-data:
  user-data:
  restaurant-data:
  order-data:
  delivery-data:
  redis-data:
  pgadmin-data:   # ✅ persist pgAdmin settings across restarts